<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>owockibot Community Contribution Heatmap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;--accent:#58a6ff;--green0:#161b22;--green1:#0e4429;--green2:#006d32;--green3:#26a641;--green4:#39d353}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;min-height:100vh;padding:24px}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.5rem;font-weight:600;margin-bottom:4px}
.subtitle{color:var(--dim);font-size:.875rem;margin-bottom:20px}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.controls input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:.875rem;width:340px}
.controls input::placeholder{color:var(--dim)}
.legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.legend-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:.75rem;transition:all .15s}
.legend-btn:hover{border-color:var(--accent)}
.legend-btn.active{border-color:var(--accent);background:#1a2744}
.legend-btn .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.heatmap-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;margin-bottom:16px}
#heatmap{display:block}
.months{display:flex;gap:0;padding:0 40px 4px;margin-bottom:0}
.months span{font-size:.65rem;color:var(--dim);width:52px;text-align:left}
.days{position:absolute;left:0;top:0;display:flex;flex-direction:column;gap:3px;padding-top:0}
.days span{font-size:.6rem;color:var(--dim);height:11px;line-height:11px}
#tooltip{position:fixed;background:#1b1f23;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:.75rem;color:var(--text);pointer-events:none;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.4);max-width:240px;line-height:1.5}
#tooltip .date{font-weight:600;margin-bottom:2px}
#tooltip .count{color:var(--green4)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px}
.stat .label{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat .value{font-size:1.25rem;font-weight:700}
.stat .value.green{color:var(--green4)}
.stat .value.blue{color:var(--accent)}
.stat .value.gold{color:#e3b341}
footer{text-align:center;margin-top:24px;font-size:.7rem;color:var(--dim)}
a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <h1>🔥 owockibot Community Contribution Heatmap</h1>
  <p class="subtitle">Bounty claims, submissions, completions & payouts — powered by owockibot on Base</p>
  <div class="controls">
    <input type="text" id="walletFilter" placeholder="Filter by builder wallet (0x...)" />
    <div class="legend">
      <button class="legend-btn active" data-type="claim"><span class="dot" style="background:#f0883e"></span>Claims</button>
      <button class="legend-btn active" data-type="submission"><span class="dot" style="background:#58a6ff"></span>Submissions</button>
      <button class="legend-btn active" data-type="completion"><span class="dot" style="background:#3fb950"></span>Completions</button>
      <button class="legend-btn active" data-type="payout"><span class="dot" style="background:#e3b341"></span>Payouts</button>
    </div>
  </div>
  <div class="heatmap-wrap">
    <div class="months" id="months"></div>
    <canvas id="heatmap"></canvas>
  </div>
  <div id="tooltip"></div>
  <div class="stats" id="stats"></div>
  <footer>owockibot Community Heatmap &bull; <a href="https://0xwork.org">0xWork</a> &bull; <a href="https://github.com/franklin52448-max/owockibot-dashboard">Source</a></footer>
</div>
<script>
const TYPES={claim:{color:'#f0883e',label:'Bounty Claim'},submission:{color:'#58a6ff',label:'Work Submission'},completion:{color:'#3fb950',label:'Bounty Completed'},payout:{color:'#e3b341',label:'Payout'}};
const LEVELS=['#161b22','#0e4429','#006d32','#26a641','#39d353'];
const CELL=11,GAP=3,STEP=CELL+GAP,PAD=40;
let activeTypes=new Set(Object.keys(TYPES));
let walletFilter='';
let allActivities=[];

function seededRand(s){return function(){s=Math.sin(s)*10000;return s-Math.floor(s)}}
function generateDemo(){
  const acts=[];
  const wallets=[];
  for(let i=0;i<20;i++)wallets.push('0x'+Array.from({length:40},()=>Math.floor(Math.random()*16).toString(16)).join(''));
  const types=Object.keys(TYPES);
  const now=new Date();
  for(let d=364;d>=0;d--){
    const date=new Date(now);date.setDate(date.getDate()-d);
    const ds=date.toISOString().slice(0,10);
    const dow=date.getDay();
    const isWeekend=dow===0||dow===6;
    const base=isWeekend?1:3;
    const rng=seededRand(d*137+42);
    const n=Math.floor(rng()*base*2)+(isWeekend?0:1);
    for(let j=0;j<n;j++){
      acts.push({date:ds,type:types[Math.floor(rng()*types.length)],wallet:wallets[Math.floor(rng()*wallets.length)],amount:rng()>0.7?Math.floor(rng()*500)+10:0});
    }
  }
  return acts;
}

function aggregate(acts){
  const map={};
  acts.forEach(a=>{
    if(!map[a.date])map[a.date]={total:0,types:{},wallets:new Set()};
    map[a.date].total++;
    map[a.date].types[a.type]=(map[a.date].types[a.type]||0)+1;
    map[a.date].wallets.add(a.wallet);
  });
  return map;
}

function getLevel(count){
  if(count===0)return 0;if(count<=2)return 1;if(count<=5)return 2;if(count<=10)return 3;return 4;
}

function render(){
  const filtered=allActivities.filter(a=>{
    if(!activeTypes.has(a.type))return false;
    if(walletFilter&&!a.wallet.toLowerCase().startsWith(walletFilter.toLowerCase()))return false;
    return true;
  });
  const agg=aggregate(filtered);
  const canvas=document.getElementById('heatmap');
  const ctx=canvas.getContext('2d');
  const now=new Date();
  const startDate=new Date(now);startDate.setDate(startDate.getDate()-364);
  startDate.setDate(startDate.getDate()-startDate.getDay());
  const weeks=53;
  canvas.width=PAD+weeks*STEP+2;
  canvas.height=PAD+7*STEP+2;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let w=0;w<weeks;w++){
    for(let d=0;d<7;d++){
      const cellDate=new Date(startDate);cellDate.setDate(cellDate.getDate()+w*7+d);
      const ds=cellDate.toISOString().slice(0,10);
      const count=agg[ds]?agg[ds].total:0;
      ctx.fillStyle=LEVELS[getLevel(count)];
      ctx.fillRect(PAD+w*STEP,PAD+d*STEP,CELL,CELL);
    }
  }
  renderMonths(startDate,weeks);
  renderStats(filtered,agg);
}

function renderMonths(start,weeks){
  const el=document.getElementById('months');el.innerHTML='';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let lastMonth=-1;
  for(let w=0;w<weeks;w++){
    const d=new Date(start);d.setDate(d.getDate()+w*7);
    if(d.getMonth()!==lastMonth){
      lastMonth=d.getMonth();
      const sp=document.createElement('span');
      sp.textContent=months[d.getMonth()];
      sp.style.marginLeft=(w===0?0:w*STEP-20)+'px';
      el.appendChild(sp);
    }
  }
}

function renderStats(acts,agg){
  let totalPayout=0,uniqueWallets=new Set(),maxStreak=0,curStreak=0;
  acts.forEach(a=>{if(a.type==='payout')totalPayout+=a.amount;uniqueWallets.add(a.wallet)});
  const now=new Date();
  for(let d=364;d>=0;d--){
    const ds=new Date(now);ds.setDate(ds.getDate()-d);const key=ds.toISOString().slice(0,10);
    if(agg[key]&&agg[key].total>0){curStreak++;if(curStreak>maxStreak)maxStreak=curStreak}else curStreak=0;
  }
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="label">Total Contributions</div><div class="value green">${acts.length.toLocaleString()}</div></div>
    <div class="stat"><div class="label">Total Payouts</div><div class="value gold">$${totalPayout.toLocaleString()}</div></div>
    <div class="stat"><div class="label">Active Builders</div><div class="value blue">${uniqueWallets.size}</div></div>
    <div class="stat"><div class="label">Longest Streak</div><div class="value green">${maxStreak} days</div></div>
  `;
}

const tooltip=document.getElementById('tooltip');
document.getElementById('heatmap').addEventListener('mousemove',e=>{
  const rect=e.target.getBoundingClientRect();
  const x=e.clientX-rect.left-PAD,y=e.clientY-rect.top-PAD;
  const w=Math.floor(x/STEP),d=Math.floor(y/STEP);
  if(w<0||w>=53||d<0||d>=7){tooltip.style.display='none';return}
  const now=new Date();const start=new Date(now);start.setDate(start.getDate()-364);start.setDate(start.getDate()-start.getDay());
  const cellDate=new Date(start);cellDate.setDate(cellDate.getDate()+w*7+d);
  const ds=cellDate.toISOString().slice(0,10);
  const filtered=allActivities.filter(a=>{if(!activeTypes.has(a.type))return false;if(walletFilter&&!a.wallet.toLowerCase().startsWith(walletFilter.toLowerCase()))return false;return true});
  const agg=aggregate(filtered);
  const info=agg[ds];
  if(!info||info.total===0){tooltip.style.display='none';return}
  let html=`<div class="date">${ds}</div><div class="count">${info.total} contributions</div>`;
  Object.entries(info.types).forEach(([t,c])=>{html+=`<div><span style="color:${TYPES[t].color}">●</span> ${TYPES[t].label}: ${c}</div>`});
  html+=`<div>${info.wallets.size} builder${info.wallets.size>1?'s':''}</div>`;
  tooltip.innerHTML=html;tooltip.style.display='block';
  tooltip.style.left=(e.clientX+12)+'px';tooltip.style.top=(e.clientY-10)+'px';
});
document.getElementById('heatmap').addEventListener('mouseleave',()=>{tooltip.style.display='none'});

document.getElementById('walletFilter').addEventListener('input',e=>{walletFilter=e.target.value.trim();render()});
document.querySelectorAll('.legend-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.type;
    if(activeTypes.has(t)){activeTypes.delete(t);btn.classList.remove('active')}
    else{activeTypes.add(t);btn.classList.add('active')}
    render();
  });
});

allActivities=generateDemo();
render();
</script>
</body>
</html>
